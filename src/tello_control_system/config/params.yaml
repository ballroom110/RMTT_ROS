# Parameters for tello_control_system keyboard control
max_linear_speed: 0.3      # m/s max velocity
max_angular_speed: 1.0     # rad/s max yaw rate
decay_rate: 0.95           # exponential decay when no input
step_size: 0.1             # increment per keystroke
watchdog_timeout: 3.0      # auto-land timeout (seconds)

# Acceleration limits (new safety features)
max_linear_accel: 0.5      # m/s^2 max linear acceleration
max_angular_accel: 2.0     # rad/s^2 max angular acceleration
